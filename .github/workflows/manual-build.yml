name: Manual Docker Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag'
        required: false
        default: 'latest'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: clash4docker:${{ inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image as tar
        run: |
          docker save clash4docker:${{ inputs.version }} | gzip > /tmp/clash4docker-image.tar.gz
          ls -lh /tmp/clash4docker-image.tar.gz

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(inputs.version, 'v')
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          files: /tmp/clash4docker-image.tar.gz

      - name: Upload as artifact
        if: ${{ !startsWith(inputs.version, 'v') }}
        uses: actions/upload-artifact@v4
        with:
          name: clash4docker-image
          path: /tmp/clash4docker-image.tar.gz
