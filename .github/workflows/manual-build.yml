name: Manual Docker Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag'
        required: false
        default: 'latest'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: clash4docker:${{ inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image as tar
        run: |
          docker save clash4docker:${{ inputs.version }} | gzip > /tmp/clash4docker-image.tar.gz
          ls -lh /tmp/clash4docker-image.tar.gz

      - name: Upload as artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: clash4docker-image-${{ inputs.version }}
          path: /tmp/clash4docker-image.tar.gz

      - name: Upload to Release
        if: startsWith(inputs.version, 'v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ inputs.version }}" --repo ${{ github.repository }} &>/dev/null; then
            gh release upload "${{ inputs.version }}" /tmp/clash4docker-image.tar.gz --clobber --repo ${{ github.repository }}
          else
            gh release create "${{ inputs.version }}" /tmp/clash4docker-image.tar.gz \
              --title "${{ inputs.version }}" \
              --generate-notes \
              --repo ${{ github.repository }}
          fi
