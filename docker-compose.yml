services:
  glash:
    image: gangz1o/glash:latest
    container_name: glash
    restart: unless-stopped

    # 网络模式:
    # - bridge（默认）: 端口隔离，但 TUN 模式 UDP 可能因 Docker NAT 冲突导致"找不到 IP"
    # - host: TUN 模式 UDP 最佳，但端口直接暴露在宿主机
    # 如果使用 TUN + UDP，建议取消下一行的注释
    # network_mode: host

    ports:
      - '7890:7890' # HTTP 代理 (TCP)
      - '7891:7891' # SOCKS5 代理 (TCP+UDP)
      - '7891:7891/udp'
      - '7892:7892' # 混合代理 (TCP+UDP)
      - '7892:7892/udp'
      - '9090:9090' # API 控制器 & Dashboard

    volumes:
      # 挂载配置目录（用于持久化配置和缓存）
      # 使用订阅功能时，配置文件会自动下载到此目录
      - ./config:/root/.config/mihomo
      # 或者挂载单个配置文件（不使用订阅功能时）
      # - ./config.yaml:/root/.config/mihomo/config.yaml:ro

    environment:
      - TZ=Asia/Shanghai
      # ========== 订阅功能配置 ==========
      # 订阅地址（设置后会自动下载配置文件）
      # - SUB_URL=https://your-subscription-url.com/config
      # 订阅自动更新 cron 表达式
      # 常用格式:
      #   - "0 */6 * * *"  每6小时更新一次
      #   - "0 0 * * *"    每天凌晨更新
      #   - "0 */12 * * *" 每12小时更新一次
      #   - "*/30 * * * *" 每30分钟更新一次
      # - SUB_CRON=0 */6 * * *
      # Dashboard 登录密钥（会自动注入到配置文件中）
      # - SECRET=your-secret-here
      # TUN 模式开关（启用需同时取消下方 cap_add/devices 注释）
      # - TUN_ENABLED=true
      # DNS 覆写开关（推荐启用，自动注入修复后的 DNS 配置）
      - DNS_OVERRIDE=true
      # IPv6 开关
      - IPV6_ENABLED=true
      # Sniffer 开关（嗅探 TLS/QUIC/UDP 流量，提升 UDP 识别）
      - SNIFFER_ENABLED=true


    # TUN 模式需要以下权限（如启用 TUN_ENABLED=true，取消下方注释）
    # 注意: 如果宿主机没有 /dev/net/tun 设备或未加载 tun 模块，取消注释会导致容器启动失败
    # cap_add:
    #   - NET_ADMIN
    # devices:
    #   - /dev/net/tun:/dev/net/tun

    # 健康检查
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:9090/version']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

# ==================== 订阅模式示例 ====================
# 使用订阅功能时的完整示例配置：
#
# services:
#   glash:
#     image: gangz1o/glash:latest
#     container_name: glash
#     restart: unless-stopped
#     ports:
#       - '7890:7890'
#       - '7891:7891'
#       - '9090:9090'
#     volumes:
#       - ./config:/root/.config/mihomo
#     environment:
#       - TZ=Asia/Shanghai
#       - SUB_URL=https://your-subscription-url.com/config
#       - SUB_CRON=0 */6 * * *
#       - SECRET=your-dashboard-password
